# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
      - targets:
            # - alertmanager:9093

            # Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"
  - "prometheus.rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: [ "prometheus:9090" ]
        # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
        labels:
          app: "prometheus"
  # node exporter to monitor CPU, memory usage, etc. of host machine
  - job_name: "node-exporter"

    # Override the global default and scrape targets from this job every 5 seconds.
    scrape_interval: 5s

    static_configs:
      - targets: [ "node-exporter:9100", "node-exporter:9101" ]
        labels:
          group: "prod"

      - targets: [ "node-exporter:9102" ]
        labels:
          group: "dev"
  # demo node express server to monitor request, response latency, etc.
  - job_name: "demo-node-express-server"
    static_configs:
      - targets: [ "demo-node-express-server:3000" ]
        labels:
          app: "demo-node-express-server"
